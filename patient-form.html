<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Patient Registration Form</title>
</head>
<body>
    <!-- Banner Section -->
    <header>
        <h1>Welcome to the Patient Registration</h1>
        <p id="datetime"></p>
        <script>
            // Displaying current date and time
            document.getElementById('datetime').innerHTML = new Date().toUTCString();
        </script>
    </header>

    <!-- Patient Registration Form -->
    <form action="thankyou.html" method="POST">
        <table>
            <tr>
                <td><label for="firstName">First Name:</label></td>
                <td><input type="text" id="firstName" name="firstName" required></td>
            </tr>
            <tr>
                <td><label for="middleInitial">Middle Initial:</label></td>
                <td><input type="text" id="middleInitial" name="middleInitial" maxlength="1"></td>
            </tr>
            <tr>
                <td><label for="lastName">Last Name:</label></td>
                <td><input type="text" id="lastName" name="lastName" required></td>
            </tr>
            <tr>
                <td><label for="dob">Date of Birth:</label></td>
                <td><input type="date" id="dob" name="dob" required></td>
            </tr>
            <tr>
                <td><label for="ssn">Social Security:</label></td>
                <td><input type="text" id="ssn" name="ssn" required></td>
            </tr>
            <tr>
                <td><label for="address">Address:</label></td>
                <td><input type="text" id="address1" name="address1" required><br>
                <input type="text" id="address2" name="address2"></td>
            </tr>
            <tr>
                <td><label for="city">City:</label></td>
                <td><input type="text" id="city" name="city" required></td>
            </tr>
            <tr>
                <td><label for="state">State:</label></td>
                <td>
                    <select id="state" name="state" required>
                        <option value="">Select State</option>
                        <option value="state1">State 1</option>
                        <option value="state2">State 2</option>
                        <!-- Add more states as needed -->
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="zip">Zip Code:</label></td>
                <td><input type="text" id="zip" name="zip" required></td>
            </tr>
            <tr>
                <td><label for="email">Email:</label></td>
                <td><input type="email" id="email" name="email" required></td>
            </tr>
            <tr>
                <td><label for="phone">Phone:</label></td>
                <td><input type="tel" id="phone" name="phone" required></td>
            </tr>
            <tr>
                <td><label for="userId">User ID:</label></td>
                <td><input type="text" id="userId" name="userId" required></td>
            </tr>
            <tr>
                <td><label for="password">Password:</label></td>
                <td><input type="password" id="password" name="password" required></td>
            </tr>
            <tr>
                <td><label for="rePassword">Re-enter Password:</label></td>
                <td><input type="password" id="rePassword" name="rePassword" required></td>
            </tr>
            <tr>
                <td colspan="2">
                    <label>Medical History:</label><br>
                    <input type="checkbox" name="history" value="condition1"> Condition 1<br>
                    <input type="checkbox" name="history" value="condition2"> Condition 2<br>
                    <!-- Add more checkboxes as needed -->
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <label>Gender:</label><br>
                    <input type="radio" name="gender" value="male" required> Male<br>
                    <input type="radio" name="gender" value="female"> Female<br>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <label>Vaccination Status:</label><br>
                    <input type="radio" name="vaccination" value="yes" required> Yes<br>
                    <input type="radio" name="vaccination" value="no"> No<br>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <label>Insurance Status:</label><br>
                    <input type="radio" name="insurance" value="insured" required> Insured<br>
                    <input type="radio" name="insurance" value="uninsured"> Uninsured<br>
                </td>
            </tr>
            <tr>
                <td><label for="healthRating">Health Rating:</label></td>
                <td><input type="range" id="healthRating" name="healthRating" min="1" max="10"></td>
            </tr>
            <tr>
                <td><label for="symptoms">Symptoms:</label></td>
                <td><textarea id="symptoms" name="symptoms"></textarea></td>
            </tr>
            <tr>
                <td colspan="2">
                    <button type="button" onclick="clearForm()">Clear</button>
                    <button type="submit">Submit</button>
                </td>
            </tr>
        </table>
    </form>

    <footer>
        <button onclick="location.href='contact.html'">Contact Us</button>
    </footer>

    <script>
        function clearForm() {
            document.querySelector('form').reset();
        }
    </script>
</body>
</html>
